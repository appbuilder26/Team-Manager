<!DOCTYPE html>
<html>
<head>
  <title>My Event App</title>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

</head>
<body>
  <h1>Event Staff Manager</h1>
  <button onclick="addStaff()">Add Staff</button>

  <ul id="staffList"></ul>

  <script>
    function addStaff() {
      const name = prompt("Enter staff name:");
      if(name) {
        const li = document.createElement("li");
        li.textContent = name;
        document.getElementById("staffList").appendChild(li);
      }
    }
  </script>

  <p>Welcome to AppBuilder26 a customized interacive client and team portal to make your business flow with less work.</p>
</body>
</html>
